<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Expense Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f1ea; --card:#ffffff; --border:#e6e2d6; --border-strong:#cdc8b8;
    --text:#1b2230; --text-secondary:#5d6270; --text-muted:#93917f;
    --accent:#0e7c66; --accent-bg:#e3f3ee; --accent-text:#0a5746;
    --indigo:#22305a; --indigo-bg:#e9ecf6;
    --danger:#b1392f; --danger-bg:#fbeae7;
    --warning:#9a5b12; --warning-bg:#faecd8;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:radial-gradient(900px 400px at 100% -10%,rgba(14,124,102,.08),transparent 60%),var(--bg);
    color:var(--text); padding:1.5rem;
  }
  .wrap{max-width:480px;margin:0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  h1{font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em;}
  h1 span{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .avatar{
    width:34px;height:34px;border-radius:50%;background:var(--indigo);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
    cursor:pointer;border:none;flex-shrink:0;overflow:hidden;padding:0;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .sync-badge{
    font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--border-strong);
    color:var(--text-secondary);background:var(--card);display:flex;align-items:center;gap:4px;white-space:nowrap;
  }
  .sync-badge.cloud{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent);}
  input,select{
    width:100%;height:42px;border:1px solid var(--border-strong);border-radius:var(--radius);
    padding:0 12px;font-size:14px;background:var(--card);color:var(--text);
  }
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;}
  label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:6px;}
  button{
    cursor:pointer;font-size:14px;border-radius:var(--radius);border:1px solid var(--border-strong);
    background:var(--card);color:var(--text);padding:10px 16px;font-family:inherit;
  }
  button:active{transform:scale(.98);}
  .primary-btn{background:var(--indigo);color:#fff;border:none;width:100%;font-weight:600;height:44px;}
  .google-btn{
    background:#fff;color:#3c4043;border:1px solid #dadce0;width:100%;height:44px;
    font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .google-btn svg{width:18px;height:18px;flex-shrink:0;}
  .ghost-btn{background:transparent;border:1px solid var(--border-strong);width:100%;}
  .danger-btn{background:transparent;color:var(--danger);border:1px solid #f0c4bf;width:100%;}
  .tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .tabbtn{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;}
  .tabbtn.active{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent);}
  .metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.25rem;}
  .metric-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;position:relative;overflow:hidden;}
  .metric-card.hero{background:linear-gradient(135deg,var(--indigo),#344a82);color:#fff;border:none;}
  .metric-card.hero p.label{color:rgba(255,255,255,.7);}
  .metric-card p.label{font-size:12.5px;color:var(--text-secondary);margin:0 0 4px;}
  .metric-card p.value{font-size:22px;font-weight:700;margin:0;letter-spacing:-.01em;}
  .bar-track{height:9px;background:var(--border);border-radius:5px;overflow:hidden;margin-top:6px;}
  .bar-fill{height:100%;border-radius:5px;transition:width .4s ease;}
  .warning-box{display:flex;gap:8px;align-items:flex-start;padding:11px 13px;border-radius:var(--radius);font-size:13px;margin-bottom:8px;line-height:1.4;}
  .warning-box.warn{background:var(--warning-bg);color:var(--warning);}
  .warning-box.danger{background:var(--danger-bg);color:var(--danger);}
  .warning-box.ok{color:var(--text-secondary);background:var(--card);border:1px solid var(--border);}
  .warning-box.info{background:var(--accent-bg);color:var(--accent-text);}
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:6px 0 1rem;}
  .catbtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;font-size:12px;}
  .catbtn.selected{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent);}
  .field{margin-bottom:1rem;}
  .history-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
  .history-row .left{display:flex;flex-direction:column;}
  .history-row .cat{font-size:14px;}
  .history-row .date{font-size:12px;color:var(--text-muted);}
  .history-row .right{display:flex;align-items:center;gap:10px;}
  .history-row .amt{font-size:14px;font-weight:600;}
  .del-btn{border:none;background:transparent;color:var(--text-muted);font-size:13px;padding:4px 8px;}
  .empty{font-size:13px;color:var(--text-secondary);padding:1rem 0;}
  .chart-wrap{position:relative;height:220px;margin-bottom:1rem;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;}
  .setup-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:420px;}
  .footnote{font-size:12px;color:var(--text-muted);margin-top:1rem;line-height:1.5;}
  .section-title{font-size:13px;color:var(--text-secondary);margin:0 0 8px;font-weight:600;}
  .ring-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:1rem;}
  .ring-text p{margin:0;}
  .ring-text .big{font-size:18px;font-weight:700;}
  .ring-text .small{font-size:12.5px;color:var(--text-secondary);}
  .loading{font-size:13px;color:var(--text-muted);padding:2rem 0;text-align:center;}
  hr.div{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--indigo);color:#fff;padding:10px 18px;border-radius:99px;
    font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1;}
  .config-note{
    background:var(--warning-bg);color:var(--warning);border-radius:var(--radius);
    padding:12px;font-size:12.5px;line-height:1.6;margin-bottom:1rem;
  }
  .config-note code{background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-size:11.5px;font-family:monospace;}
  .step-list{counter-reset:step;list-style:none;padding:0;margin:0;}
  .step-list li{counter-increment:step;display:flex;gap:10px;font-size:13px;line-height:1.5;margin-bottom:8px;}
  .step-list li::before{
    content:counter(step);min-width:20px;height:20px;border-radius:50%;
    background:var(--indigo);color:#fff;font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>UPI <span>expense</span> tracker</h1>
    <div class="topbar-right">
      <span class="sync-badge" id="syncBadge">💾 Local</span>
      <button class="avatar" id="avatarBtn">🙂</button>
    </div>
  </div>
  <div id="app"><div class="loading">Loading your data…</div></div>
</div>
<div class="toast" id="toast"></div>

<!-- Chart.js already loaded above as UMD, so this module only handles Firebase + app logic -->
<script type="module">

// ══════════════════════════════════════════════════════
// STEP 1 — FIREBASE SDK IMPORTS
// ══════════════════════════════════════════════════════
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider,
         signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ══════════════════════════════════════════════════════
// FIREBASE CONFIG — replace all three values with your
// own from the Firebase Console → Project Settings
// ══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyB_uUBvtG-PO38qOIgd9f0MNhUrK7XkGvU",
  authDomain:        "upitranscation.firebaseapp.com",
  projectId:         "upitranscation",
  storageBucket:     "upitranscation.firebasestorage.app",
  messagingSenderId: "644446665956",
  appId:             "1:644446665956:web:2b649662e16df7213100f1",
  measurementId:     "G-E05Z8CLS7N"
};

// Detect whether the user has filled in real config
const FIREBASE_CONFIGURED = !firebaseConfig.apiKey.startsWith("YOUR");

let auth, provider, db;
if (FIREBASE_CONFIGURED) {
  const app = initializeApp(firebaseConfig);
  auth     = getAuth(app);
  provider = new GoogleAuthProvider();
  db       = getFirestore(app);
}

// ══════════════════════════════════════════════════════
// STEP 2 — CURRENT USER VARIABLE
// ══════════════════════════════════════════════════════
let currentUser = null;  // populated by onAuthStateChanged or after login

// ══════════════════════════════════════════════════════
// APP CONSTANTS & RUNTIME STATE
// ══════════════════════════════════════════════════════
const CATS      = ['Food','Travel','Rent','Shopping','Recharge','Other'];
const ICON      = {Food:'🍔',Travel:'🚗',Rent:'🏠',Shopping:'🛍️',Recharge:'📱',Other:'•••'};
const CAT_COLOR = {Food:'#0e7c66',Travel:'#22305a',Rent:'#b1392f',Shopping:'#9a5b12',Recharge:'#5b6cc7',Other:'#8a8474'};
const LS_KEY    = 'upi-tracker-v3';

let state            = null;
let tab              = 'dashboard';
let selectedCat      = 'Food';
let lastRenderedDate = todayStr();

function defaultState(){
  return { name:'', income:0, savingsGoal:0, dailyLimitOverride:0, expenses:[], setupDone:false };
}

// ══════════════════════════════════════════════════════
// STEP 7 — SAVE TO FIRESTORE
// ══════════════════════════════════════════════════════
async function saveToCloud(){
  await setDoc(
    doc(db, 'users', currentUser.uid),
    { data: state },
    { merge: true }
  );
}

// ══════════════════════════════════════════════════════
// STEP 8 — LOAD FROM FIRESTORE
// ══════════════════════════════════════════════════════
async function loadFromCloud(){
  const snap = await getDoc(doc(db, 'users', currentUser.uid));
  return snap.exists() ? snap.data().data : null;
}

// ══════════════════════════════════════════════════════
// STEP 3 — saveState()
// Always writes to localStorage; if signed in → also
// writes to Firestore so data syncs across devices.
// ══════════════════════════════════════════════════════
async function saveState(){
  // 1. Always save locally first (instant, offline-safe)
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ console.warn('localStorage write failed', e); }

  // 2. If logged in → save to cloud as well
  if(currentUser && FIREBASE_CONFIGURED){
    try{ await saveToCloud(); }
    catch(e){
      console.warn('Cloud save failed', e);
      showToast('⚠️ Cloud sync failed — saved locally');
    }
  }
}

// ══════════════════════════════════════════════════════
// STEP 4 — loadState()
// If signed in → prefer cloud data (and cache locally).
// Otherwise → use localStorage, fallback to defaults.
// ══════════════════════════════════════════════════════
async function loadState(){
  if(currentUser && FIREBASE_CONFIGURED){
    try{
      const cloud = await loadFromCloud();
      if(cloud){
        // Cache cloud data locally so it survives offline
        try{ localStorage.setItem(LS_KEY, JSON.stringify(cloud)); }catch(e){}
        return cloud;
      }
    }catch(e){ console.warn('Cloud load failed, falling back to localStorage', e); }
  }
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return defaultState();
}

// ══════════════════════════════════════════════════════
// STEP 6 — googleLogin() / googleLogout()
// ══════════════════════════════════════════════════════
async function googleLogin(){
  if(!FIREBASE_CONFIGURED){ showToast('Add your Firebase config first'); return; }
  try{
    const result  = await signInWithPopup(auth, provider);
    currentUser   = result.user;
    showToast('Signing in — loading your cloud data…');
    state = await loadState();         // pull latest from cloud
    await saveState();                 // merge any local-only changes
    updateSyncBadge();
    render();
  }catch(e){ console.error(e); showToast('Sign-in failed: ' + (e.message||e.code)); }
}

async function googleLogout(){
  if(!FIREBASE_CONFIGURED) return;
  try{
    await signOut(auth);
    currentUser = null;
    updateSyncBadge();
    showToast('Signed out — using local storage');
    render();
  }catch(e){ console.error(e); }
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function fmt(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function monthStart(){
  const d=new Date();
  return new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10);
}
function weekStart(){
  const d=new Date(); const day=d.getDay(); const diff=(day===0?6:day-1);
  const ws=new Date(d); ws.setDate(d.getDate()-diff); return ws.toISOString().slice(0,10);
}
function spendable(){ return Math.max(state.income - state.savingsGoal, 0); }
function daysInMonth(){
  const d=new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
}
function computedDailyLimit(){ return spendable() / daysInMonth(); }
function dailyLimit(){ return state.dailyLimitOverride > 0 ? state.dailyLimitOverride : computedDailyLimit(); }
function spentBetween(from){ return state.expenses.filter(e=>e.date>=from).reduce((s,e)=>s+e.amount,0); }
function initials(){
  const n=(state.name||'').trim();
  if(!n) return '🙂';
  return n.split(/\s+/).slice(0,2).map(p=>p[0].toUpperCase()).join('');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
function updateSyncBadge(){
  const b=document.getElementById('syncBadge');
  if(b){
    if(currentUser && FIREBASE_CONFIGURED){
      b.className='sync-badge cloud'; b.textContent='☁️ Cloud';
    } else {
      b.className='sync-badge'; b.textContent='💾 Local';
    }
  }
  const av=document.getElementById('avatarBtn');
  if(!av) return;
  if(currentUser && currentUser.photoURL){
    av.innerHTML=`<img src="${currentUser.photoURL}" alt="avatar" referrerpolicy="no-referrer"/>`;
  } else {
    av.textContent = state ? initials() : '🙂';
  }
}

// Auto-refresh when the date changes (tab left open overnight)
function startDateWatcher(){
  setInterval(()=>{
    const now = todayStr();
    if(now !== lastRenderedDate){ lastRenderedDate = now; render(); }
  }, 60000);
  document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden){ lastRenderedDate = todayStr(); render(); }
  });
}

// ══════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════
function render(){
  const el=document.getElementById('app');
  updateSyncBadge();
  if(!state || !state.setupDone){ el.innerHTML=setupView(); attachSetup(); return; }
  el.innerHTML=`
    <div class="tabs">
      ${tabBtn('dashboard','📊','Dashboard')}
      ${tabBtn('add','➕','Add')}
      ${tabBtn('history','📜','History')}
      ${tabBtn('insights','💡','Insights')}
      ${tabBtn('profile','👤','Profile')}
    </div>
    <div id="tab-content"></div>`;
  document.querySelectorAll('.tabbtn').forEach(b=>
    b.addEventListener('click',()=>{ tab=b.dataset.tab; render(); })
  );
  const c=document.getElementById('tab-content');
  if(tab==='dashboard') c.innerHTML=dashboardView();
  if(tab==='add'){ c.innerHTML=addView(); attachAdd(); }
  if(tab==='history'){ c.innerHTML=historyView(); attachHistory(); }
  if(tab==='insights'){ c.innerHTML=insightsView(); setTimeout(drawCharts,0); }
  if(tab==='profile'){ c.innerHTML=profileView(); attachProfile(); }
}
function tabBtn(id,icon,label){
  return `<button class="tabbtn ${tab===id?'active':''}" data-tab="${id}">${icon} ${label}</button>`;
}

// ── SETUP ──────────────────────────────────────────
function setupView(){
  return `<div class="setup-card">
    <p style="font-weight:700;font-size:16px;margin:0 0 4px;">Set up your budget</p>
    <p style="font-size:13px;color:var(--text-secondary);margin:0 0 1.25rem;">
      Saved locally first. Sign in with Google later to sync across devices.
    </p>
    <div class="field"><label>Your name</label><input id="name" type="text" placeholder="Asha"/></div>
    <div class="field"><label>Monthly income (₹)</label><input id="inc" type="number" placeholder="40000"/></div>
    <div class="field"><label>Savings goal (₹)</label><input id="sav" type="number" placeholder="15000"/></div>
    <div class="field">
      <label>Daily spending limit — leave blank to auto-calculate</label>
      <input id="dlim" type="number" placeholder="e.g. 800 (optional)"/>
    </div>
    <button class="primary-btn" id="setupBtn">Start tracking</button>
  </div>`;
}
function attachSetup(){
  document.getElementById('setupBtn').addEventListener('click', async ()=>{
    state.name               = document.getElementById('name').value.trim();
    state.income             = parseFloat(document.getElementById('inc').value)||0;
    state.savingsGoal        = parseFloat(document.getElementById('sav').value)||0;
    state.dailyLimitOverride = parseFloat(document.getElementById('dlim').value)||0;
    state.setupDone          = true;
    await saveState(); render();
  });
}

// ── DASHBOARD ──────────────────────────────────────
function dashboardView(){
  const today=spentBetween(todayStr()), week=spentBetween(weekStart()), month=spentBetween(monthStart());
  const remaining=Math.max(spendable()-month,0);
  const pct=spendable()>0?Math.min((month/spendable())*100,100):0;
  const dLimit=dailyLimit();
  const todayPct=dLimit>0?Math.min((today/dLimit)*100,100):0;
  const warnings=[];
  if(dLimit>0 && today>dLimit)
    warnings.push({type:'danger', text:`You've spent ${fmt(today)} today — ${fmt(today-dLimit)} over your ${fmt(dLimit)} daily limit.`});
  else if(dLimit>0 && todayPct>=80)
    warnings.push({type:'warn', text:`You're at ${Math.round(todayPct)}% of today's ${fmt(dLimit)} limit.`});
  if(pct>=100) warnings.push({type:'danger', text:`Monthly budget fully used.`});
  else if(pct>=80) warnings.push({type:'warn', text:`Monthly budget ${Math.round(pct)}% used — ${fmt(remaining)} remaining.`});
  return `
  <div class="metric-grid">
    <div class="metric-card hero">
      <p class="label">Daily limit</p>
      <p class="value">${fmt(dLimit)}</p>
      <div class="bar-track" style="background:rgba(255,255,255,.25);">
        <div class="bar-fill" style="width:${todayPct}%;background:${todayPct>=100?'#e07a6b':'#7fd6c0'};"></div>
      </div>
      <p style="font-size:11px;color:rgba(255,255,255,.6);margin:4px 0 0;">${fmt(today)} spent today</p>
    </div>
    ${metricCard('Week spent',fmt(week))}
    ${metricCard('Month spent',fmt(month))}
    ${metricCard('Remaining',fmt(remaining))}
  </div>
  <div style="margin-bottom:1.25rem;">
    <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);">
      <span>Monthly budget used</span><span>${Math.round(pct)}% · ${fmt(remaining)} left</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width:${pct}%;background:${pct>=100?'var(--danger)':pct>=80?'var(--warning)':'var(--accent)'};"></div>
    </div>
  </div>
  ${warnings.length
    ? warnings.map(w=>`<div class="warning-box ${w.type}">⚠️ ${w.text}</div>`).join('')
    : `<div class="warning-box ok">✓ You're on track — no warnings right now.</div>`}
  <p class="footnote">
    Salary: ${fmt(state.income)} · Savings goal: ${fmt(state.savingsGoal)} · Spendable: ${fmt(spendable())}
    ${state.dailyLimitOverride>0?' · Daily limit set manually':' · Daily limit auto-calculated'}
  </p>`;
}
function metricCard(label,val){
  return `<div class="metric-card"><p class="label">${label}</p><p class="value">${val}</p></div>`;
}

// ── ADD EXPENSE ────────────────────────────────────
function addView(){
  return `<div style="max-width:420px;">
    <div class="field"><label>Amount (₹)</label><input id="amt" type="number" placeholder="250"/></div>
    <div class="field">
      <label>Category</label>
      <div class="cat-grid">${CATS.map(c=>`<button class="catbtn" data-cat="${c}">${ICON[c]}<br>${c}</button>`).join('')}</div>
    </div>
    <div class="field"><label>Date</label><input id="date" type="date" value="${todayStr()}"/></div>
    <div class="field"><label>Note (optional)</label><input id="note" type="text" placeholder="Lunch with friends"/></div>
    <button class="primary-btn" id="addBtn">Add expense</button>
  </div>`;
}
function attachAdd(){
  selectedCat='Food';
  document.querySelectorAll('.catbtn').forEach(b=>{
    if(b.dataset.cat===selectedCat) b.classList.add('selected');
    b.addEventListener('click',()=>{
      selectedCat=b.dataset.cat;
      document.querySelectorAll('.catbtn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    });
  });
  document.getElementById('addBtn').addEventListener('click', async ()=>{
    const amount=parseFloat(document.getElementById('amt').value);
    if(!amount||amount<=0){ alert('Enter a valid amount'); return; }
    const date=document.getElementById('date').value||todayStr();
    const note=document.getElementById('note').value;
    state.expenses.push({id:Date.now().toString(), amount, category:selectedCat, date, note});
    await saveState();
    showToast(currentUser && FIREBASE_CONFIGURED ? '✓ Saved & synced to cloud' : '✓ Saved locally');
    tab='dashboard'; render();
  });
}

// ── HISTORY ────────────────────────────────────────
function historyView(){
  const sorted=[...state.expenses].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if(!sorted.length) return `<div class="empty">No expenses yet — add your first from the "Add" tab.</div>`;
  return sorted.map(e=>`
    <div class="history-row">
      <div class="left">
        <span class="cat">${ICON[e.category]||'•'} ${e.category}${e.note?' · '+e.note:''}</span>
        <span class="date">${e.date}</span>
      </div>
      <div class="right">
        <span class="amt">${fmt(e.amount)}</span>
        <button class="del-btn" data-id="${e.id}">✕</button>
      </div>
    </div>`).join('');
}
function attachHistory(){
  document.querySelectorAll('.del-btn').forEach(b=>b.addEventListener('click', async ()=>{
    state.expenses=state.expenses.filter(e=>e.id!==b.dataset.id);
    await saveState(); render();
  }));
}

// ── INSIGHTS ───────────────────────────────────────
function insightsView(){
  const month=spentBetween(monthStart()), remaining=spendable()-month;
  const daysLeft=daysInMonth()-new Date().getDate(), dLimit=dailyLimit();
  const recentDaily=month/Math.max(new Date().getDate(),1);
  let prediction;
  if(recentDaily>dLimit && remaining>0){
    const d=Math.max(Math.floor(remaining/recentDaily),0);
    prediction=d<=daysLeft
      ? `At this rate you'll exceed budget in ${d} day${d===1?'':'s'}.`
      : `At this rate you're on track to finish within budget.`;
  } else {
    prediction=`At this rate you're on track to finish within budget.`;
  }
  const byCat={}; CATS.forEach(c=>byCat[c]=0);
  state.expenses.filter(e=>e.date>=monthStart()).forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
  const total=Object.values(byCat).reduce((a,b)=>a+b,0)||1;
  const foodPct=(byCat.Food/total)*100;
  return `
  <p class="section-title">Category breakdown (this month)</p>
  <div class="chart-wrap"><canvas id="catChart"></canvas></div>
  <p class="section-title">Last 7 days</p>
  <div class="chart-wrap" style="height:160px;"><canvas id="trendChart"></canvas></div>
  <div class="warning-box info">📈 ${prediction}</div>
  ${foodPct>40?`<div class="warning-box warn">💡 Food is ${Math.round(foodPct)}% of this month's spending — your biggest category.</div>`:''}`;
}
function drawCharts(){
  if(!window.Chart) return;
  const byCat={}; CATS.forEach(c=>byCat[c]=0);
  state.expenses.filter(e=>e.date>=monthStart()).forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
  const usedCats=CATS.filter(c=>byCat[c]>0);
  const ctx=document.getElementById('catChart');
  if(ctx){
    if(usedCats.length){
      new Chart(ctx,{
        type:'doughnut',
        data:{labels:usedCats,datasets:[{data:usedCats.map(c=>byCat[c]),backgroundColor:usedCats.map(c=>CAT_COLOR[c]),borderColor:'#fff',borderWidth:2,hoverOffset:6}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11},color:'#5d6270'}}}}
      });
    } else {
      const p=document.createElement('p'); p.className='empty'; p.textContent='No expenses this month yet.'; ctx.parentElement.appendChild(p);
    }
  }
  const ctx2=document.getElementById('trendChart');
  if(ctx2){
    const days=[];
    for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().slice(0,10)); }
    const totals=days.map(d=>state.expenses.filter(e=>e.date===d).reduce((s,e)=>s+e.amount,0));
    new Chart(ctx2,{
      type:'line',
      data:{labels:days.map(d=>d.slice(5)),datasets:[{data:totals,borderColor:'#0e7c66',backgroundColor:'rgba(14,124,102,.12)',fill:true,tension:0.35,pointRadius:3,pointBackgroundColor:'#0e7c66'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.06)'}},x:{grid:{display:false}}}}
    });
  }
}

// ── PROFILE (STEP 5 — Login button lives here) ─────
function googleSVG(){
  return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </svg>`;
}
function profileView(){
  const cloudSection = !FIREBASE_CONFIGURED
    ? `<div class="config-note">
        <strong>Firebase not configured yet.</strong><br>
        Open this HTML file, find <code>firebaseConfig</code> near the top of the script,
        and replace the three <code>YOUR_*</code> placeholders with values from your
        Firebase Console. Then enable <strong>Google Authentication</strong> and
        <strong>Firestore Database</strong> in the console.
        <br><br>Firestore rules to paste:
        <pre style="margin:6px 0 0;font-size:11px;overflow:auto;">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{userId} {
      allow read, write: if request.auth.uid == userId;
    }
  }
}</pre>
      </div>`
    : currentUser
      ? `<div class="warning-box info" style="margin-bottom:.75rem;">
           ☁️ Signed in as <strong>${currentUser.displayName||currentUser.email}</strong> — data syncs on every save.
         </div>
         <button class="ghost-btn" id="p-logout" style="margin-bottom:.5rem;">Sign out from this device</button>`
      : `<button class="google-btn" id="p-login">${googleSVG()} Continue with Google</button>
         <p class="footnote" style="margin-top:6px;">Sign in to sync your data across devices.</p>`;

  return `<div style="max-width:420px;">
    <div class="ring-row">
      <div class="avatar" style="width:48px;height:48px;font-size:16px;cursor:default;">
        ${currentUser && currentUser.photoURL
          ? `<img src="${currentUser.photoURL}" alt="avatar" referrerpolicy="no-referrer"/>`
          : initials()}
      </div>
      <div class="ring-text">
        <p class="big">${state.name||'No name set'}</p>
        <p class="small">${state.expenses.length} expense${state.expenses.length===1?'':'s'} logged · ${currentUser&&FIREBASE_CONFIGURED?'Cloud sync on':'Local only'}</p>
      </div>
    </div>

    <p class="section-title">Cloud sync</p>
    ${cloudSection}

    <hr class="div">
    <p class="section-title">Budget settings</p>
    <div class="field"><label>Your name</label><input id="p-name" type="text" value="${state.name||''}" placeholder="Asha"/></div>
    <div class="field"><label>Monthly income (₹)</label><input id="p-inc" type="number" value="${state.income||''}"/></div>
    <div class="field"><label>Savings goal (₹)</label><input id="p-sav" type="number" value="${state.savingsGoal||''}"/></div>
    <div class="field">
      <label>Daily spending limit (0 = auto from income − savings ÷ days)</label>
      <input id="p-dlim" type="number" value="${state.dailyLimitOverride||''}" placeholder="0 = auto"/>
    </div>
    <button class="primary-btn" id="p-save">Save changes</button>

    <hr class="div">
    <p class="section-title">Danger zone</p>
    <button class="danger-btn" id="p-reset">Clear all expenses &amp; reset budget</button>
  </div>`;
}
function attachProfile(){
  const loginBtn  = document.getElementById('p-login');
  const logoutBtn = document.getElementById('p-logout');
  if(loginBtn)  loginBtn.addEventListener('click', googleLogin);
  if(logoutBtn) logoutBtn.addEventListener('click', googleLogout);

  document.getElementById('p-save').addEventListener('click', async ()=>{
    state.name               = document.getElementById('p-name').value.trim();
    state.income             = parseFloat(document.getElementById('p-inc').value)||0;
    state.savingsGoal        = parseFloat(document.getElementById('p-sav').value)||0;
    state.dailyLimitOverride = parseFloat(document.getElementById('p-dlim').value)||0;
    await saveState();
    showToast('✓ Settings saved');
    tab='dashboard'; render();
  });
  document.getElementById('p-reset').addEventListener('click', async ()=>{
    if(!confirm('Delete all expenses and reset budget settings? This cannot be undone.')) return;
    state=defaultState();
    await saveState(); render();
  });
}

// ══════════════════════════════════════════════════════
// STEP 9 — onAuthStateChanged (auto login restore)
// Fires on page load — if the user was already signed in,
// this restores the session and loads cloud data silently.
// ══════════════════════════════════════════════════════
async function init(){
  if(FIREBASE_CONFIGURED){
    onAuthStateChanged(auth, async (user)=>{
      const wasLoggedIn = !!currentUser;
      currentUser = user || null;
      if(user && !wasLoggedIn){
        // Session restored — reload state from cloud
        state = await loadState();
        updateSyncBadge();
        render();
      } else if(!user && wasLoggedIn){
        updateSyncBadge();
        render();
      }
    });
  }

  // Load initial state (cloud if already authed, local otherwise)
  state = await loadState();
  lastRenderedDate = todayStr();
  updateSyncBadge();
  render();
  startDateWatcher();

  document.getElementById('avatarBtn')
    .addEventListener('click', ()=>{ tab='profile'; render(); });
}

init();
</script>
